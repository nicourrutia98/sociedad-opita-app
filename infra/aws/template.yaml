AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Description: >
  Sociedad Opita API — FastAPI + Mangum en AWS Lambda.
  Expone /v1/cities, /v1/cities/:id/personas, /v1/simulate, /v1/stream, /v1/chat.
  El frontend en Cloudflare Pages (sociedad.opitacode.com) consume este API.

Parameters:
  Stage:
    Type: String
    Default: prod
    Description: Stage name (prod, dev, staging)
  DeepSeekApiKey:
    Type: String
    NoEcho: true
    Description: API key de DeepSeek (vía OpenRouter o directo)
    Default: ''

Globals:
  Function:
    Runtime: python3.12
    MemorySize: 512
    Timeout: 30
      Environment:
        Variables:
          STAGE: !Ref Stage
          DEEPSEEK_API_KEY: !Ref DeepSeekApiKey
          DEEPSEEK_BASE_URL: 'https://api.deepseek.com/v1'
          SESSIONS_TABLE: !Ref SessionsTable
          POWERTOOLS_SERVICE_NAME: 'sociedad-opita-api'
          LOG_LEVEL: 'INFO'

Resources:
  # API Gateway HTTP API (mas barato que REST API, suficiente para v1)
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Stage
      CorsConfiguration:
        AllowOrigins:
          - 'https://sociedad.opitacode.com'
          - 'https://www.sociedad.opitacode.com'
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - '*'
        AllowCredentials: true
        MaxAge: 86400

  # Lambda Function
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'sociedad-opita-api-${Stage}'
      CodeUri: ../../api/
      Handler: main.handler
      Description: 'Sociedad Opita API — FastAPI + Mangum'
      Events:
        ApiProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY
        HealthCheck:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /health
            Method: GET
      Policies:
        - CloudWatchLogsFullAccess
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: '*'

  # CloudWatch Log Group
  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/sociedad-opita-api-${Stage}'
      RetentionInDays: 30

  # DynamoDB — sesiones de visitantes y estado efimero
  # PAY_PER_REQUEST billing — escala a cero cuando no hay trafico
  # single-table design (access pattern: pk='SESSION#<id>', sk='META')
  SessionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub 'sociedad-opita-sessions-${Stage}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

Outputs:
  ApiUrl:
    Description: URL del API
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}'
    Export:
      Name: !Sub 'sociedad-opita-api-url-${Stage}'

  FunctionName:
    Description: Nombre de la Lambda
    Value: !Ref ApiFunction
    Export:
      Name: !Sub 'sociedad-opita-api-function-${Stage}'
